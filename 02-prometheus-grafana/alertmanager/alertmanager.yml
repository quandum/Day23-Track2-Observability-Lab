global:
  resolve_timeout: 1m

route:
  receiver: 'slack-critical'
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: 'slack-critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE/ME'
        send_resolved: true
        title: 'CRITICAL: ServiceDown Alert'
        text: "Alert firing - inference-api is down"

inhibit_rules:
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]